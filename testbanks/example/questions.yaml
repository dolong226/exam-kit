title: "Kiểm tra tổng hợp: Tin học, Toán & Vật lý"
description: "Bộ đề mẫu kết hợp các môn học cơ bản để test hệ thống."
questions:
  # --- Câu 1: Trắc nghiệm Tin học ---
  - id: "info_01"
    type: "multiple_choice"
    content: "Trong HTML, thẻ nào được sử dụng để nhúng mã CSS trực tiếp vào tài liệu?"
    choices:
      - "<script>"
      - "<style>"
      - "<link>"
      - "<css>"
    correct_answer: 1  # Tương ứng với "<style>" (index 1)
    explanation: "Thẻ <style> được sử dụng bên trong phần <head> để định nghĩa CSS nội bộ cho trang web."

  # --- Câu 2: Trắc nghiệm Toán ---
  - id: "math_01"
    type: "multiple_choice"
    content: "Hàm số nào sau đây biểu diễn một đường parabol?"
    choices:
      - "y = 2x + 1"
      - "y = 0.68x"
      - "y = 0,44x^2 - 2"
      - "y = 1/x"
    correct_answer: 2  # Tương ứng với "y = 0,44x^2 - 2" (index 2)
    explanation: "Đường parabol được biểu diễn bằng hàm số bậc hai dạng y = ax^2 + bx + c (với a khác 0)."

  # --- Câu 3: Tự luận Vật lý ---
  - id: "phys_01"
    type: "essay"
    content: |
      Phát biểu nguyên lý thứ nhất của nhiệt động lực học.
    correct_answer: "Độ biến thiên nội năng của một hệ bằng tổng công và nhiệt lượng mà hệ nhận được."
    explanation: "Biểu thức cơ bản: Delta U = A + Q."